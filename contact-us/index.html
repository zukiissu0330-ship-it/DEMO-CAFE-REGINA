<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAFE REGINA | Contact Us</title>
  <meta name="description" content="Contact Us page placeholder for CAFE REGINA.">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="page page-contact-us">
<main class="contact">

  <!-- ヒーロー -->
  <section class="contact-hero">
    <div class="contact-hero__inner">
      <h1 class="contact-hero__title">Contact Café Regina</h1>
      <p class="contact-hero__text">
        We would love to hear from you. Feel free to contact us anytime.
      </p>
    </div>
  </section>

  <!-- フォーム -->
  <section class="contact-form">
    <div class="contact-form__inner">
      <h2 class="contact-form__title">Contact Us</h2>
      <form class="contact-form__form" action="#" method="post">
        <div class="contact-form__group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your Name">
        </div>
        <div class="contact-form__group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your Email">
        </div>
        <div class="contact-form__group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Your Message"></textarea>
        </div>
        <button type="submit" class="contact-form__button">
          Send Message
        </button>
      </form>
    </div>
  </section>

</html>
